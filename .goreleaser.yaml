version: 2

project_name: nfe

before:
  hooks:
    - go mod tidy

builds:
  - id: nfe
    main: ./cmd/nfe
    binary: nfe
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/caian-org/nfe/internal/cli.Version={{.Version}}
      - -X github.com/caian-org/nfe/internal/cli.Commit={{.Commit}}
      - -X github.com/caian-org/nfe/internal/cli.BuildDate={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - README.md
      - LICENSE*

dockers_v2:
  - id: nfe
    ids:
      - nfe
    dockerfile: Dockerfile
    images:
      - ghcr.io/caian-org/nfe
    tags:
      - '{{ .Tag }}'
      - latest
    platforms:
      - linux/amd64
    flags:
      - --target=goreleaser-runtime
    labels:
      org.opencontainers.image.title: nfe
      org.opencontainers.image.description: CLI para NFS-e ABRASF v2.04
      org.opencontainers.image.source: https://github.com/caian-org/nfe
      org.opencontainers.image.revision: '{{ .FullCommit }}'
      org.opencontainers.image.version: '{{ .Version }}'

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  name_template: '{{ .ProjectName }} {{ .Version }}'
